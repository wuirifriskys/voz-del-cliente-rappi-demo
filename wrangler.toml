# Cloudflare Worker configuration for the Voz del Cliente dashboard + Telegram webhook.
#
# IMPORTANT: This file is committed to a public repo. It must contain only
# variable NAMES and non-sensitive config. All secret VALUES are set via:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put TELEGRAM_BOT_TOKEN
#
# Public values (SUPABASE_URL, SUPABASE_ANON_KEY) can live in [vars] because
# Supabase anon keys are designed to be exposed and are gated by Row-Level
# Security policies on the database side.

name = "voz-del-cliente-rappi-demo"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

# Public static assets — files in ./public/ are served at the matching path
# (e.g., public/avatar.jpg → /avatar.jpg). The Worker script still handles
# routes that aren't matched by a static file.
[assets]
directory = "./public"
not_found_handling = "none"
binding = "ASSETS"

# All values (including Supabase URL + anon key) are set via `wrangler secret put`
# so the public repo never contains any live credential, even RLS-gated ones.
# Expected secrets (set once, then `wrangler deploy`):
#   - SUPABASE_URL
#   - SUPABASE_ANON_KEY
#   - SUPABASE_SERVICE_ROLE_KEY
#   - ANTHROPIC_API_KEY
#   - TELEGRAM_BOT_TOKEN
#   - TELEGRAM_WEBHOOK_SECRET
